{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <h1>Register sahifasi</h1>
    
    <form method="post">
        {% csrf_token %}
        <input type="text" name="phone" placeholder="Telefon raqam"><br><br>
        <input type="text" name="username" placeholder="Username"><br><br>
        <input type="password" name="password" placeholder="Parol"><br><br>
        <button type="submit">Oddiy Register</button> 
    </form>

    <br>
    <hr>
    <br>

    <!-- Google orqali ro'yxatdan o'tish tugmasi -->
    <a href="{% provider_login_url 'google' %}">
        <button style="background-color: #db4437; color: white; padding: 10px; border: none; cursor: pointer;">
            Google orqali ro'yxatdan o'tish
        </button>
    </a>
    
    <br><br>
    <a href="{% url 'login' %}">Agar ro'yhatdan o'tgan bo'lsang kir</a>

</body>
</html>
